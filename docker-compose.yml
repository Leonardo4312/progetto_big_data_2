version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: ev_nexus_db
    environment:
      POSTGRES_USER: ev_user
      POSTGRES_PASSWORD: ev_password
      POSTGRES_DB: ev_nexus_db
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
